# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
- main

pool:
  name: Default

variables:
  buildConfiguration: 'Release'

steps:

- task: UseDotNet@2
  inputs:
    packageType: 'sdk'
    version: '10.0.x'

- script: dotnet restore
  displayName: Restore dependencies

- script: dotnet build Oqtane.Application.slnx --configuration $(buildConfiguration) --no-restore
  displayName: Build solution

- script: |
    dotnet publish Server/Oqtane.Application.Server.csproj \
      --configuration $(buildConfiguration) \
      --output $(Build.ArtifactStagingDirectory)/out
  displayName: Publish Oqtane Server

- task: ArchiveFiles@2
  displayName: 'Zip published files'
  inputs:
    rootFolderOrFile: '$(Build.ArtifactStagingDirectory)/out'
    includeRootFolder: false
    archiveType: 'zip'
    archiveFile: '$(Build.ArtifactStagingDirectory)/oqtane-server.zip'
    replaceExistingArchive: true

# 2. Publish the ZIP file as a Pipeline Artifact (Recommended over PublishBuildArtifacts)
- task: PublishPipelineArtifact@1
  displayName: 'Publish ZIP artifact'
  inputs:
    targetPath: '$(Build.ArtifactStagingDirectory)/oqtane-server.zip'
    artifactName: 'oqtane'
    publishLocation: 'pipeline'
